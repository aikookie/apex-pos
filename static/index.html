<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#16213e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-touch-fullscreen" content="yes">
  <meta name="apple-mobile-web-app-title" content="Apex POS">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <title>Apex POS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e; color: #eee;
      min-height: 100vh; overflow-x: hidden;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .screen { 
      display: none; padding: 16px; min-height: 100vh;
      padding-bottom: 80px;
    }
    .screen.active { display: block; }
    
    /* Login */
    .login-screen { 
      display: none; flex-direction: column;
    }
    .login-screen.active { 
      display: flex; 
      justify-content: center; align-items: center;
      gap: 24px;
    }
    .logo { font-size: 32px; font-weight: bold; color: #e94560; }
    .pin-display {
      display: flex; gap: 12px;
    }
    .pin-dot {
      width: 16px; height: 16px; border-radius: 50%;
      background: #16213e; border: 2px solid #e94560;
    }
    .pin-dot.filled { background: #e94560; }
    .pin-keypad {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 16px; max-width: 340px; width: 100%;
    }
    a.pin-key { display:flex;align-items:center;justify-content:center;text-decoration:none;color:inherit; } .pin-key {
      width: 100%; height: 80px; border-radius: 16px;
      background: #16213e; border: none; color: #fff;
      font-size: 32px; font-weight: bold; cursor: pointer;
      touch-action: manipulation;
    }
    .pin-key:active { background: #e94560; transform: scale(0.95); }
    .pin-key.clear { background: #c73e3e; }
    .pin-key.enter { background: #3e8c70; }
    
    .pin-display {
      display: flex; gap: 16px; margin-bottom: 30px;
    }
    .pin-dot {
      width: 20px; height: 20px; border-radius: 50%;
      background: #16213e; border: 3px solid #e94560;
    }
    .pin-dot.filled { background: #e94560; }
    
    /* Header */
    .header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 0; margin-bottom: 16px; border-bottom: 1px solid #333;
    }
    .header h1 { font-size: 20px; color: #e94560; }
    .btn {
      padding: 10px 16px; border-radius: 8px; border: none;
      background: #e94560; color: #fff; font-weight: bold; font-size: 14px;
    }
    .btn.small { padding: 6px 12px; font-size: 12px; }
    .btn.secondary { background: #333; }
    
    /* Categories */
    .categories { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px; }
    .category-chip {
      padding: 8px 16px; border-radius: 20px; background: #16213e;
      white-space: nowrap; cursor: pointer; font-size: 13px;
    }
    .category-chip.active { background: #e94560; }
    
    /* Menu Items */
    .menu-grid {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .menu-item {
      background: #16213e; border-radius: 12px; padding: 12px;
      cursor: pointer;
    }
    .menu-item h3 { font-size: 14px; margin-bottom: 4px; }
    .menu-item .price { color: #e94560; font-weight: bold; }
    .menu-item .stock { font-size: 11px; color: #888; }
    .menu-item .spicy { color: #ff6b6b; font-size: 11px; }
    
    /* Cart */
    .cart-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #16213e; padding: 12px 16px;
      display: flex; justify-content: space-between; align-items: center;
      border-top: 1px solid #333;
    }
    .cart-bar .total { font-size: 18px; font-weight: bold; }
    .cart-bar .count { background: #e94560; padding: 2px 8px; border-radius: 10px; font-size: 12px; }
    
    /* Modal */
    .modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.8); z-index: 100;
      justify-content: center; align-items: center;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: #1a1a2e; border-radius: 16px; padding: 20px;
      width: 90%; max-width: 400px; max-height: 80vh; overflow-y: auto;
    }
    .modal-header { display: flex; justify-content: space-between; margin-bottom: 16px; }
    .modal-close { background: none; border: none; color: #888; font-size: 24px; cursor: pointer; }
    
    /* Tables */
    .table-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
    }
    .table-card {
      background: #16213e; border-radius: 12px; padding: 16px; text-align: center;
      cursor: pointer;
    }
    .table-card.occupied { border: 2px solid #e94560; }
    .table-card .number { font-size: 24px; font-weight: bold; }
    .table-card .status { font-size: 12px; color: #888; }
    
    /* Orders */
    .order-list { display: flex; flex-direction: column; gap: 12px; }
    .order-card {
      background: #16213e; border-radius: 12px; padding: 12px;
    }
    .order-card .header { border: none; margin: 0; padding: 0; }
    .order-card .items { font-size: 13px; color: #aaa; }
    .order-card .total { color: #e94560; font-weight: bold; }
    .order-card .status {
      display: inline-block; padding: 4px 12px; border-radius: 12px;
      font-size: 11px; background: #333;
    }
    .order-card .status.open { background: #3e8cc7; }
    .order-card .status.preparing { background: #c7a33e; }
    .order-card .status.ready { background: #3ec76b; }
    .order-card .status.paid { background: #333; }
    
    /* Bottom Nav */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #16213e; display: flex;
      border-top: 1px solid #333;
    }
    .nav-item {
      flex: 1; padding: 12px; text-align: center;
      font-size: 11px; cursor: pointer;
    }
    .nav-item.active { color: #e94560; }
    .nav-icon { font-size: 20px; display: block; margin-bottom: 2px; }
    
    /* Utils */
    .hidden { display: none !important; }
    .loading { text-align: center; padding: 40px; color: #888; }
    .empty { text-align: center; padding: 40px; color: #666; }
    
    /* Responsive - Tablets (iPad) */
    @media (min-width: 768px) {
      .menu-grid { grid-template-columns: repeat(4, 1fr); gap: 16px; }
      .table-grid { grid-template-columns: repeat(5, 1fr); gap: 16px; }
      a.pin-key { display:flex;align-items:center;justify-content:center;text-decoration:none;color:inherit; } .pin-key { width: 90px; height: 90px; font-size: 28px; }
      .pin-keypad { gap: 16px; max-width: 340px; }
      .screen { padding: 24px; }
    }
    
    /* Responsive - Desktop */
    @media (min-width: 1024px) {
      .menu-grid { grid-template-columns: repeat(5, 1fr); gap: 20px; }
      .table-grid { grid-template-columns: repeat(6, 1fr); gap: 20px; }
      a.pin-key { display:flex;align-items:center;justify-content:center;text-decoration:none;color:inherit; } .pin-key { width: 100px; height: 100px; font-size: 32px; }
      .pin-keypad { gap: 20px; max-width: 380px; }
    }
  </style>
</head>
<body>

<!-- Login Screen -->
<div id="login" class="screen login-screen active">
  <div class="logo">🍜 Apex POS</div>
  <select id="staffSelect" style="width:200px;padding:12px;margin-bottom:20px;background:#16213e;color:#fff;border:1px solid #333;border-radius:8px;font-size:16px;">
    <option value="">Select Staff</option>
    <option value="1">Owner</option>
    <option value="2">Manager</option>
    <option value="3">Server</option>
  </select>
  <div class="pin-display">
    <div class="pin-dot" id="dot0"></div>
    <div class="pin-dot" id="dot1"></div>
    <div class="pin-dot" id="dot2"></div>
    <div class="pin-dot" id="dot3"></div>
  </div>
  <div class="pin-keypad">
    <a href="#press-1" class="pin-key">1</a>
    <a href="#press-2" class="pin-key">2</a>
    <a href="#press-3" class="pin-key">3</a>
    <a href="#press-4" class="pin-key">4</a>
    <a href="#press-5" class="pin-key">5</a>
    <a href="#press-6" class="pin-key">6</a>
    <a href="#press-7" class="pin-key">7</a>
    <a href="#press-8" class="pin-key">8</a>
    <a href="#press-9" class="pin-key">9</a>
    <a href="#press-C" class="pin-key clear">C</a>
    <a href="#press-0" class="pin-key">0</a>
    <a href="#press-E" class="pin-key enter">↵</a>
  </div>
</div>

<!-- Main Screen -->
<div id="main" class="screen">
  <div class="header">
    <h1>Menu</h1>
    <button class="btn small" id="viewCartBtn">Cart <span class="cart-count">0</span></button>
  </div>
  
  <div class="categories" id="categories"></div>
  <div class="menu-grid" id="menuGrid"></div>
  
  <div class="cart-bar" id="cartBar" style="display:none;">
    <div class="total">$<span id="cartTotal">0.00</span></div>
    <button class="btn" id="checkoutBtn">Checkout</button>
  </div>
</div>

<!-- Tables Screen -->
<div id="tables" class="screen">
  <div class="header">
    <h1>Tables</h1>
    <button class="btn small" id="newTableBtn">+ Table</button>
  </div>
  <div class="table-grid" id="tableGrid"></div>
</div>

<!-- Orders Screen -->
<div id="orders" class="screen">
  <div class="header">
    <h1>Orders</h1>
    <button class="btn small" id="newOrderBtn">+ New Order</button>
  </div>
  <div class="order-list" id="orderList"></div>
</div>

<!-- Printer Settings Modal -->
<div class="modal" id="printerModal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>🖨️ Printer Settings</h2>
      <button class="modal-close" id="closePrinterModal">&times;</button>
    </div>
    <div id="printerModalBody" style="padding: 20px;">
      <div style="margin-bottom: 20px;">
        <label style="display:block; margin-bottom:8px; color:#888;">Connection Type</label>
        <select id="printMethod" style="width:100%; padding:12px; background:#16213e; color:#fff; border:1px solid #333; border-radius:8px;">
          <option value="usb">USB Printer</option>
          <option value="network">Network/Ethernet</option>
          <option value="bluetooth">Bluetooth</option>
        </select>
      </div>
      
      <!-- Network Settings -->
      <div id="networkSettings" style="display:none;">
        <div style="margin-bottom:12px;">
          <label style="display:block; margin-bottom:8px; color:#888;">Printer IP Address</label>
          <input type="text" id="printerIp" placeholder="192.168.1.100" style="width:100%; padding:12px; background:#16213e; color:#fff; border:1px solid #333; border-radius:8px;">
        </div>
        <div style="margin-bottom:12px;">
          <label style="display:block; margin-bottom:8px; color:#888;">Port (default 9100)</label>
          <input type="number" id="printerPort" placeholder="9100" value="9100" style="width:100%; padding:12px; background:#16213e; color:#fff; border:1px solid #333; border-radius:8px;">
        </div>
      </div>
      
      <!-- USB Settings -->
      <div id="usbSettings">
        <div style="margin-bottom:12px;">
          <label style="display:block; margin-bottom:8px; color:#888;">USB Device Name</label>
          <input type="text" id="usbDevice" placeholder="default" style="width:100%; padding:12px; background:#16213e; color:#fff; border:1px solid #333; border-radius:8px;">
        </div>
      </div>
      
      <!-- Bluetooth Settings -->
      <div id="bluetoothSettings" style="display:none;">
        <button class="btn" style="width:100%; margin-bottom:12px;" id="scanBluetoothBtn">🔍 Scan for Printers</button>
        <div id="bluetoothDevices" style="max-height:150px; overflow-y:auto;"></div>
        <p style="color:#666; font-size:12px; margin-top:12px;">Note: Bluetooth requires Chrome browser and HTTPS</p>
      </div>
      
      <button class="btn" style="width:100%; margin-top:20px;" id="savePrinterBtn">Save Settings</button>
      <button class="btn secondary" style="width:100%; margin-top:12px;" id="testPrintBtn">🧪 Test Print</button>
    </div>
  </div>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav" id="bottomNav" style="display:none;">
  <div class="nav-item active" data-screen="main">
    <span class="nav-icon">📋</span>Menu
  </div>
  <div class="nav-item" data-screen="tables">
    <span class="nav-icon">🪑</span>Tables
  </div>
  <div class="nav-item" data-screen="orders">
    <span class="nav-icon">📝</span>Orders
  </div>
  <div class="nav-item" data-screen="kitchen">
    <span class="nav-icon">👨‍🍳</span>Kitchen
  </div>
  <div class="nav-item" data-screen="reports">
    <span class="nav-icon">📊</span>Reports
  </div>
  <div class="nav-item" data-screen="settings">
    <span class="nav-icon">⚙️</span>Settings
  </div>
</nav>

<!-- Item Modal -->
<div class="modal" id="itemModal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modalTitle">Item Name</h2>
      <button class="modal-close" id="closeModal">&times;</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<!-- Cart Modal -->
<div class="modal" id="cartModal">
  <div class="modal-content" style="max-width:500px;">
    <div class="modal-header">
      <h2>🛒 Your Order</h2>
      <button class="modal-close" id="closeCartModal">&times;</button>
    </div>
    <div id="cartModalBody" style="padding:0 20px 20px;"></div>
  </div>
</div>

<script>
const API = '';
let pin = '';

// Hash-based PIN handler for iOS PWA
window.onhashchange = function() {
  var hash = window.location.hash;
  if (hash.startsWith('#press-')) {
    var num = hash.replace('#press-', '');
    window.location.hash = '';
    if (num === 'C') { pin = ''; }
    else if (num === 'E') { verifyPin(); }
    else if (num && pin.length < 4) { pin += num; }
    updatePinDisplay();
  }
};

let cart = [];
let menuItems = [];
let categories = [];
let tables = [];
let orders = [];
let selectedCategory = 'all';

// Auth
document.querySelectorAll('.pin-key').forEach(btn => {
  btn.addEventListener('click', () => {
    const num = btn.dataset.num;
    if (num === 'C') {
      pin = '';
    } else if (num === 'E') {
      verifyPin();
    } else if (num && pin.length < 4) {
      pin += num;
    }
    updatePinDisplay();
  });
});

function updatePinDisplay() {
  for (let i = 0; i < 4; i++) {
    document.getElementById('dot' + i).classList.toggle('filled', i < pin.length);
  }
}

async function verifyPin() {
  if (pin.length !== 4) return;
  try {
    // Try each staff ID until one works
    let staff = null;
    for (let staffId = 1; staffId <= 10; staffId++) {
      const res = await fetch(API + '/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ staffId, pin })
      });
      const data = await res.json();
      if (data.token) {
        staff = data;
        localStorage.setItem('apex_token', data.token);
        break;
      }
    }
    if (staff) {
      showScreen('main');
      document.getElementById('bottomNav').style.display = 'flex';
      loadMenu();
      loadTables();
      loadOrders();
    } else {
      pin = '';
      updatePinDisplay();
    }
  } catch {
    pin = '';
    updatePinDisplay();
  }
}

function showScreen(id) {
  // Hide all screens
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('active');
    s.style.display = 'none';
  });
  
  // Show the requested screen
  const el = document.getElementById(id);
  el.classList.add('active');
  if (el.classList.contains('login-screen')) {
    el.style.display = 'flex';
  } else {
    el.style.display = 'block';
  }
}

// Nav
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    const screen = item.dataset.screen;
    showScreen(screen);
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    // Load data for specific screens
    if (screen === 'kitchen') loadKitchenOrders();
    if (screen === 'reports') showReport('sales');
    if (screen === 'settings') loadSettings();
  });
});

// Menu
async function loadMenu() {
  try {
    const res = await fetch(API + '/api/menu');
    menuItems = await res.json();
    // No /api/menu/categories - extract from items
    categories = [...new Set(menuItems.map(i => i.category))];
    renderCategories();
    renderMenu();
  } catch (e) {
    console.error(e);
  }
}

function renderCategories() {
  const container = document.getElementById('categories');
  // Extract unique categories from menu items
  const cats = [...new Set(menuItems.map(i => i.category))];
  container.innerHTML = '<div class="category-chip active" data-cat="all">All</div>';
  cats.forEach(cat => {
    container.innerHTML += `<div class="category-chip" data-cat="${cat}">${cat}</div>`;
  });
  container.querySelectorAll('.category-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      selectedCategory = chip.dataset.cat;
      container.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      renderMenu();
    });
  });
}

function renderMenu() {
  const container = document.getElementById('menuGrid');
  const items = selectedCategory === 'all' 
    ? menuItems 
    : menuItems.filter(i => i.category === selectedCategory);
  
  if (!items.length) {
    container.innerHTML = '<div class="empty">No items</div>';
    return;
  }
  
  const stockEnabled = localStorage.getItem('stock_enabled') === 'true';
  container.innerHTML = items.map(item => `
    <div class="menu-item" data-id="${item.id}">
      <h3>${item.name}</h3>
      <div class="price">$${item.price.toFixed(2)}</div>
      ${stockEnabled && item.stock != null ? '<div class="stock">Stock: ' + item.stock + '</div>' : ''}
      ${item.spicy ? '<div class="spicy">🌶️ Spicy</div>' : ''}
    </div>
  `).join('');
  
  container.querySelectorAll('.menu-item').forEach(el => {
    el.addEventListener('click', () => openItemModal(parseInt(el.dataset.id)));
  });
}

let itemModifiers = [];

async function openItemModal(itemId) {
  const item = menuItems.find(i => i.id === itemId);
  if (!item) return;
  
  itemModifiers = [];
  
  // Fetch modifiers from backend
  let modifiersHtml = '';
  try {
    const res = await fetch(API + '/api/menu/' + itemId + '/modifiers');
    const mods = await res.json();
    
    if (mods.length > 0) {
      const categories = [...new Set(mods.map(m => m.category))];
      let catHtml = '';
      categories.forEach(cat => {
        catHtml += '<div style="margin-bottom:12px;"><div style="font-size:12px;color:#888;margin-bottom:4px;text-transform:uppercase;margin-top:8px;">' + cat + '</div>';
        const catMods = mods.filter(m => m.category === cat);
        catMods.forEach(m => {
          const priceStr = m.price > 0 ? ' (+$' + m.price.toFixed(2) + ')' : '';
          catHtml += '<label style="display:flex;align-items:center;padding:8px;background:#16213e;border-radius:6px;margin-bottom:4px;cursor:pointer;"><input type="checkbox" style="width:18px;height:18px;margin-right:8px;" onchange="toggleItemModifier(' + m.id + ', \"' + m.name + '\", ' + m.price + ')"><span style="font-size:14px;">' + m.name + priceStr + '</span></label>';
        });
        catHtml += '</div>';
      });
      modifiersHtml = '<div style="margin-top:20px;padding-top:20px;border-top:1px solid #333;"><div style="font-weight:bold;margin-bottom:12px;color:#e94560;">MODIFIERS</div>' + catHtml + '</div>';
    }
  } catch(e) {}
  
  document.getElementById('modalTitle').textContent = item.name;
  document.getElementById('modalBody').innerHTML = `
    <div style="text-align:center; margin-bottom:20px;">
      <div class="price" style="font-size:24px;">$${item.price.toFixed(2)}</div>
      <div style="color:#888;">Stock: ${item.stock}</div>
    </div>
    <div style="display:flex; gap:12px; justify-content:center;">
      <button class="btn secondary" onclick="updateQty(${item.id}, -1)">−</button>
      <span id="qtyDisplay" style="font-size:24px; padding:0 20px;">1</span>
      <button class="btn" onclick="updateQty(${item.id}, 1)">+</button>
    </div>
    ${modifiersHtml}
    <div style="margin-top:20px;">
      <label style="display:block; margin-bottom:8px; color:#888;">📝 Remarks</label>
      <textarea id="itemRemarks" placeholder="Special requests..." 
        style="width:100%; padding:12px; background:#16213e; color:#fff; border:1px solid #333; 
        border-radius:8px; min-height:60px; resize:none; font-family:inherit;"></textarea>
    </div>
    <button class="btn" style="width:100%; margin-top:20px;" onclick="addItemToCart(${item.id});">
      Add to Cart
    </button>
  `;
  document.getElementById('itemModal').classList.add('active');
}

function toggleItemModifier(modId, modName, modPrice) {
  if (itemModifiers.some(m => m.id === modId)) {
    itemModifiers = itemModifiers.filter(m => m.id !== modId);
  } else {
    itemModifiers.push({ id: modId, name: modName, price: modPrice });
  }
}

function updateQty(itemId, delta) {
  const span = document.getElementById('qtyDisplay');
  let qty = parseInt(span.textContent) + delta;
  if (qty < 1) qty = 1;
  span.textContent = qty;
}

function addItemToCart(itemId) {
  const qty = parseInt(document.getElementById('qtyDisplay').textContent);
  const remarks = document.getElementById('itemRemarks').value.trim();
  const modNames = itemModifiers.map(m => m.name).join(', ');
  const fullRemarks = modNames ? modNames + (remarks ? ' | ' + remarks : '') : remarks;
  addToCart(itemId, qty, fullRemarks);
  document.getElementById('itemModal').classList.remove('active');
}

function closeModal() {
  document.getElementById('itemModal').classList.remove('active');
}

document.getElementById('closeModal').addEventListener('click', closeModal);

// Cart
function addToCart(itemId, qty = 1, remarks = '') {
  const item = menuItems.find(i => i.id === itemId);
  if (!item) return;
  
  // Find existing cart item with same ID and remarks
  const existing = cart.find(c => c.itemId === itemId && c.remarks === remarks);
  
  if (existing) {
    existing.qty += qty;
    if (existing.qty <= 0) {
      cart = cart.filter(c => !(c.itemId === itemId && c.remarks === remarks));
    }
  } else if (qty > 0) {
    cart.push({ itemId, qty, price: item.price, name: item.name, remarks });
  }
  updateCartUI();
  closeModal();
}

function updateCartUI() {
  const count = cart.reduce((sum, c) => sum + c.qty, 0);
  const total = cart.reduce((sum, c) => sum + (c.qty * c.price), 0);
  
  document.querySelectorAll('.cart-count').forEach(el => el.textContent = count);
  document.getElementById('cartTotal').textContent = total.toFixed(2);
  document.getElementById('cartBar').style.display = count > 0 ? 'flex' : 'none';
}

document.getElementById('viewCartBtn').addEventListener('click', () => {
  if (!cart.length) {
    alert('Cart is empty');
    return;
  }
  renderCartModal();
  document.getElementById('cartModal').classList.add('active');
});

function renderCartModal() {
  const container = document.getElementById('cartModalBody');
  const total = cart.reduce((sum, c) => sum + (c.qty * c.price), 0);
  
  if (!cart.length) {
    container.innerHTML = '<div class="empty">Cart is empty</div>';
    return;
  }
  
  container.innerHTML = cart.map((c, idx) => `
    <div style="background:#16213e; border-radius:12px; padding:12px; margin-bottom:12px;">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <div>
          <div style="font-weight:bold;">${c.name}</div>
          <div style="font-size:12px; color:#e94560;">$${(c.qty * c.price).toFixed(2)}</div>
          ${c.remarks ? `<div style="font-size:12px; color:#888; margin-top:4px;">📝 ${c.remarks}</div>` : ''}
        </div>
        <div style="display:flex; align-items:center; gap:8px;">
          <button class="btn small secondary" onclick="changeCartQty(${idx}, -1)">−</button>
          <span style="font-size:18px;">${c.qty}</span>
          <button class="btn small secondary" onclick="changeCartQty(${idx}, 1)">+</button>
        </div>
      </div>
    </div>
  `).join('') + `
    <div style="border-top:1px solid #333; padding-top:16px; margin-top:16px;">
      <div style="display:flex; justify-content:space-between; font-size:18px; margin-bottom:16px;">
        <span>Subtotal:</span>
        <span>$${total.toFixed(2)}</span>
      </div>
      <button class="btn" style="width:100%;" onclick="processCheckout()">Checkout — $${(total * 1.08).toFixed(2)}</button>
    </div>
  `;
}

function changeCartQty(idx, delta) {
  cart[idx].qty += delta;
  if (cart[idx].qty <= 0) {
    cart.splice(idx, 1);
  }
  updateCartUI();
  renderCartModal();
}

});

function processCheckout() {
  const total = cart.reduce((sum, c) => sum + (c.qty * c.price), 0);
  const order = {
    tableId: 1,
    items: cart.map(c => ({ 
      menuItemId: c.itemId, 
      qty: c.qty, 
      unitPrice: c.price,
      remarks: c.remarks || null
    })),
    subtotal: total,
    tax: total * 0.08,
    total: total * 1.08,
    status: 'open'
  };
  
  fetch(API + '/api/orders', {
    method: 'POST',
    headers: { 
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + localStorage.getItem('apex_token')
    },
    body: JSON.stringify(order)
  }).then(() => {
    cart = [];
    updateCartUI();
    document.getElementById('cartModal').classList.remove('active');
    loadOrders();
    alert('Order placed!');
  }).catch(e => {
    alert('Error: ' + e.message);
  });
}

  if (reason === null) return;
  
  fetch(API + '/api/orders/' + orderId + '/void', {
    method: 'POST',
    headers: { 
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + localStorage.getItem('apex_token')
    },
    body: JSON.stringify({ reason: reason || 'No reason' })
  }).then(() => {
    loadOrders();
    alert('Order voided');
  }).catch(e => alert('Error: ' + e.message));
}

function deleteOrder(orderId) {
  if (!confirm('Are you sure you want to PERMANENTLY delete this order? This cannot be undone.')) return;
  
  fetch(API + '/api/orders/' + orderId, {
    method: 'DELETE',
    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('apex_token') }
  }).then(() => {
    loadOrders();
    alert('Order deleted');
  }).catch(e => alert('Error: ' + e.message));
}

// Bluetooth printing via Web Bluetooth API
async function printViaBluetooth(order) {
  try {
    const device = await navigator.bluetooth.requestDevice({
      filters: [{ services: ['00001800-0000-1000-8000-00805f9b34fb'] }] // Serial Port Profile
    });
    const server = await device.gatt.connect();
    const service = await server.getPrimaryService('00001801-0000-1000-8000-00805f9b34fb');
    const characteristic = await service.getCharacteristic('00001801-0000-1000-8000-00805f9b34fb');
    
    const receipt = buildReceiptText(order);
    const encoder = new TextEncoder();
    await characteristic.writeValue(encoder.encode(receipt));
    
    alert('Printed via Bluetooth!');
  } catch (e) {
    if (e.name !== 'NotFoundError') {
      alert('Bluetooth error: ' + e.message);
    }
  }
}

function buildReceiptText(order) {
  let text = 'APEX POS\n----------------\n';
  text += `Order #${order.id}\n`;
  text += `Table: ${order.Table?.number || 'Takeout'}\n`;
  text += `Date: ${new Date(order.createdAt).toLocaleString()}\n`;
  text += '----------------\n';
  
  for (const item of order.OrderItems || []) {
    const qty = item.quantity;
    const name = item.MenuItem?.name || 'Item';
    const price = (item.price + (item.modifierPrice || 0)) * qty / 100;
    text += `${qty}x ${name}\n`;
    text += `   $${price.toFixed(2)}\n`;
  }
  
  text += '----------------\n';
  text += `Subtotal: $${(order.subtotal/100).toFixed(2)}\n`;
  text += `Tax: $${(order.tax/100).toFixed(2)}\n`;
  text += `TOTAL: $${(order.total/100).toFixed(2)}\n`;
  text += '----------------\n';
  text += 'Thank you!\n\n\n';
  return text;
}

      const items = await res.json();

  } else if (tab === 'modifiers') {
    try {
      const res = await fetch(API + '/api/modifiers');

      const items = await res.json();
      content.innerHTML = `
        <div style="display:grid;gap:8px;">
          ${items.map(i => `
            <div style="background:#16213e;padding:12px;border-radius:8px;display:flex;justify-content:space-between;align-items:center;">
              <div>
                <div style="font-weight:bold;">${i.name}</div>
                <div style="color:#888;font-size:12px;">Stock: ${i.stock !== null ? i.stock : 'Unlimited'}</div>
              </div>
              <div style="display:flex;gap:8px;align-items:center;">
                <input type="number" id="stock-${i.id}" value="${i.stock || 0}" style="width:60px;padding:8px;border-radius:4px;background:#1a1a2e;color:#fff;border:1px solid #333;">
                <button class="btn small" onclick="updateStock(${i.id})">Update</button>
                <button class="btn small" style="background:#ff4444;" onclick="removeStock(${i.id})">Remove</button>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    } catch(e) { content.innerHTML = '<div style="color:#ff4444;">Error loading stock - Admin required</div>'; }
  } else if (tab === 'system') {
    const stockEnabled = localStorage.getItem('stock_enabled') === 'true';
    content.innerHTML = `
      <div style="background:#16213e;padding:16px;border-radius:8px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;">
        <div>
          <div style="font-weight:bold;">Stock Tracking</div>
          <div style="color:#888;font-size:12px;">Show stock in menu</div>
        </div>
        <button class="btn small" onclick="toggleStock()" style="background:${stockEnabled ? '#4ade80' : '#333'};">${stockEnabled ? 'ON' : 'OFF'}</button>
      </div>
      <button class="btn" style="width:100%;margin-bottom:12px;" id="testApiBtn">Test API</button>
      <button class="btn secondary" style="width:100%;margin-bottom:12px;" id="printBtn">Print Last Receipt</button>
      <button class="btn" style="width:100%;margin-bottom:12px;" id="printerSettingsBtn">🖨️ Printer Settings</button>
      <button class="btn" style="width:100%;margin-bottom:12px;" id="logoutBtn">Logout</button>
      <button class="btn secondary" style="width:100%;" onclick="location.reload()">Reload</button>
    `;
    setTimeout(() => {
      document.getElementById('logoutBtn')?.addEventListener('click', () => { localStorage.clear(); location.reload(); });
      document.getElementById('testApiBtn')?.addEventListener('click', async () => { alert('API working!'); });
      document.getElementById('printBtn')?.addEventListener('click', async () => { alert('No recent receipt'); });
      document.getElementById('printerSettingsBtn')?.addEventListener('click', async () => { document.getElementById('printerModal').style.display = 'block'; });
    }, 100);
  }
}

async function showAddMenuItemModal() {
  const catRes = await fetch(API + '/api/menu/categories');
  const categories = await catRes.json();
  const catOptions = categories.length ? categories.map(c => `<option value="${c}">${c}</option>`).join('') : '<option value="Main">Main</option>';
  const html = `
    <div style="display:grid;gap:12px;">
      <input type="text" id="newItemName" placeholder="Item Name" style="padding:12px;border-radius:8px;background:#1a1a2e;color:#fff;border:1px solid #333;">
      <select id="newItemCategory" style="padding:12px;border-radius:8px;background:#1a1a2e;color:#fff;border:1px solid #333;">
        ${catOptions}
        <option value="__new__">+ New Category</option>
      </select>
      <input type="number" id="newItemPrice" placeholder="Price" step="0.01" style="padding:12px;border-radius:8px;background:#1a1a2e;color:#fff;border:1px solid #333;">
      <input type="text" id="newItemDesc" placeholder="Description" style="padding:12px;border-radius:8px;background:#1a1a2e;color:#fff;border:1px solid #333;">
      <label style="display:flex;align-items:center;gap:8px;"><input type="checkbox" id="newItemPopular"> Popular</label>
      <label style="display:flex;align-items:center;gap:8px;"><input type="checkbox" id="newItemSpicy"> Spicy</label>
      <button class="btn" style="margin-top:12px;width:100%;" onclick="saveNewMenuItem()">Save Menu Item</button>
    </div>
  `;
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalTitle').textContent = 'Add Menu Item';
  document.getElementById('itemModal').style.display = 'block';
  
  document.getElementById('closeModal').onclick = () => document.getElementById('itemModal').style.display = 'none';
}

async function saveNewMenuItem() {
  const name = document.getElementById('newItemName').value;
  if (!name) return alert('Name required');
  const category = document.getElementById('newItemCategory').value;
  const price = parseFloat(document.getElementById('newItemPrice').value) || 0;
  const description = document.getElementById('newItemDesc').value;
  const popular = document.getElementById('newItemPopular').checked;
  const spicy = document.getElementById('newItemSpicy').checked;
  
  await fetch(API + '/api/menu', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('apex_token') },
    body: JSON.stringify({ name, category, price, description, popular, spicy })
  });
  document.getElementById('itemModal').style.display = 'none';
  showSettingsTab('menu', null);
}

async function saveNewModifier() {

  if (!name) return alert('Name required');
  const category = document.getElementById('newModCategory').value;
  const price = parseFloat(document.getElementById('newModPrice').value) || 0;
  
  await fetch(API + '/api/modifiers', {
    method: 'POST',

function toggleStock() {
  const current = localStorage.getItem('stock_enabled');
  localStorage.setItem('stock_enabled', current === 'true' ? 'false' : 'true');
  showSettingsTab('system', null);
}

async function editMenuItem(id) {
  try {
    const res = await fetch(API + '/api/menu/' + id, { headers: { 'Authorization': 'Bearer ' + localStorage.getItem('apex_token') }});
    const item = await res.json();
    const catRes = await fetch(API + '/api/menu/categories');
    const categories = await catRes.json();
    const catOptions = categories.map(c => `<option value="${c}" ${c === item.category ? 'selected' : ''}>${c}</option>`).join('');
    
    const html = `
      <div style="display:grid;gap:12px;">
        <input type="text" id="editItemName" value="${item.name}" style="padding:12px;border-radius:8px;background:#1a1a2e;color:#fff;border:1px solid #333;">
        <select id="editItemCategory" style="padding:12px;border-radius:8px;background:#1a1a2e;color:#fff;border:1px solid #333;">
          ${catOptions}
        </select>
        <input type="number" id="editItemPrice" value="${item.price}" step="0.01" style="padding:12px;border-radius:8px;background:#1a1a2e;color:#fff;border:1px solid #333;">
        <input type="text" id="editItemDesc" value="${item.description || ''}" style="padding:12px;border-radius:8px;background:#1a1a2e;color:#fff;border:1px solid #333;">
        <label style="display:flex;align-items:center;gap:8px;"><input type="checkbox" id="editItemPopular" ${item.popular ? 'checked' : ''}> Popular</label>
        <label style="display:flex;align-items:center;gap:8px;"><input type="checkbox" id="editItemSpicy" ${item.spicy ? 'checked' : ''}> Spicy</label>
        <button class="btn" onclick="saveMenuItem(${id})">Save Changes</button>
      </div>
    `;
    document.getElementById('modalBody').innerHTML = html;
    document.getElementById('modalTitle').textContent = 'Edit Menu Item';
    document.getElementById('itemModal').style.display = 'block';
    document.getElementById('closeModal').onclick = () => document.getElementById('itemModal').style.display = 'none';
  } catch(e) { alert('Error loading item'); }
}

async function saveMenuItem(id) {
  const data = {
    name: document.getElementById('editItemName').value,
    category: document.getElementById('editItemCategory').value,
    price: parseFloat(document.getElementById('editItemPrice').value),
    description: document.getElementById('editItemDesc').value,
    popular: document.getElementById('editItemPopular').checked,
    spicy: document.getElementById('editItemSpicy').checked
  };
  await fetch(API + '/api/menu/' + id, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('apex_token') },
    body: JSON.stringify(data)
  });
  document.getElementById('itemModal').style.display = 'none';
  showSettingsTab('menu', null);
}

async function updateStock(id) {
  const stock = parseInt(document.getElementById('stock-' + id).value);
  await fetch(API + '/api/menu/' + id, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('apex_token') },
    body: JSON.stringify({ stock })
  });
  alert('Stock updated!');
}

async function removeStock(id) {
  if (!confirm('Remove all stock? Set to 0?')) return;
  await fetch(API + '/api/menu/' + id, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('apex_token') },
    body: JSON.stringify({ stock: 0 })
  });
  document.getElementById('stock-' + id).value = 0;
  alert('Stock removed!');
}

async function deleteModifier(id) {
  if (!confirm('Delete this modifier?')) return;
  await fetch(API + '/api/modifiers/' + id, {
    method: 'DELETE',
    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('apex_token') }
  });
  showSettingsTab('modifiers', null);
}
</script>
