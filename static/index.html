<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#16213e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-touch-fullscreen" content="yes">
  <meta name="apple-mobile-web-app-title" content="Apex POS">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <title>Apex POS</title>
  <script src="/app.js"></script>
<script>
function testLogin() {
  alert('test');
  fetch('/api/auth/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({staffId: 1, pin: '1234'})
  }).then(r => r.json()).then(d => {
    alert('Result: ' + JSON.stringify(d));
  }).catch(e => alert('Error: ' + e));
}
</script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e; color: #eee;
      min-height: 100vh; overflow-x: hidden;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .screen { 
      display: none; padding: 16px; min-height: 100vh;
      padding-bottom: 80px;
    }
    .screen.active { display: block; }
    
    /* Login */
    .login-screen { 
      display: none; flex-direction: column;
    }
    .login-screen.active { 
      display: flex; 
      justify-content: center; align-items: center;
      gap: 24px;
    }
    .logo { font-size: 32px; font-weight: bold; color: #e94560; }
    .pin-display {
      display: flex; gap: 12px;
    }
    .pin-dot {
      width: 16px; height: 16px; border-radius: 50%;
      background: #16213e; border: 2px solid #e94560;
    }
    .pin-dot.filled { background: #e94560; }
    .pin-keypad {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 16px; max-width: 340px; width: 100%;
    }
    button.pin-key { touch-action: manipulation; display:flex;align-items:center;justify-content:center;text-decoration:none;color:inherit; border:0; } .pin-key {
      width: 100%; height: 80px; border-radius: 16px;
      background: #16213e; border: none; color: #fff;
      font-size: 32px; font-weight: bold; cursor: pointer;
      touch-action: manipulation;
    }
    .pin-key:active { background: #e94560; transform: scale(0.95); }
    .pin-key.clear { background: #c73e3e; }
    .pin-key.enter { background: #3e8c70; }
    
    .pin-display {
      display: flex; gap: 16px; margin-bottom: 30px;
    }
    .pin-dot {
      width: 20px; height: 20px; border-radius: 50%;
      background: #16213e; border: 3px solid #e94560;
    }
    .pin-dot.filled { background: #e94560; }
    
    /* Header */
    .header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 0; margin-bottom: 16px; border-bottom: 1px solid #333;
    }
    .header h1 { font-size: 20px; color: #e94560; }
    .btn {
      padding: 10px 16px; border-radius: 8px; border: none;
      background: #e94560; color: #fff; font-weight: bold; font-size: 14px;
    }
    .btn.small { padding: 6px 12px; font-size: 12px; }
    .btn.secondary { background: #333; }
    
    /* Categories */
    .categories { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px; }
    .category-chip {
      padding: 8px 16px; border-radius: 20px; background: #16213e;
      white-space: nowrap; cursor: pointer; font-size: 13px;
    }
    .category-chip.active { background: #e94560; }
    
    /* Menu Items */
    .menu-grid {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .menu-item {
      background: #16213e; border-radius: 12px; padding: 12px;
      cursor: pointer;
    }
    .menu-item h3 { font-size: 14px; margin-bottom: 4px; }
    .menu-item .price { color: #e94560; font-weight: bold; }
    .menu-item .stock { font-size: 11px; color: #888; }
    .menu-item .spicy { color: #ff6b6b; font-size: 11px; }
    
    /* Cart */
    .cart-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #16213e; padding: 12px 16px;
      display: flex; justify-content: space-between; align-items: center;
      border-top: 1px solid #333;
    }
    .cart-bar .total { font-size: 18px; font-weight: bold; }
    .cart-bar .count { background: #e94560; padding: 2px 8px; border-radius: 10px; font-size: 12px; }
    
    /* Modal */
    .modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.8); z-index: 100;
      justify-content: center; align-items: center;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: #1a1a2e; border-radius: 16px; padding: 20px;
      width: 90%; max-width: 400px; max-height: 80vh; overflow-y: auto;
    }
    .modal-header { display: flex; justify-content: space-between; margin-bottom: 16px; }
    .modal-close { background: none; border: none; color: #888; font-size: 24px; cursor: pointer; }
    
    /* Modifier Options */
    .modifier-option {
      display: flex;
      align-items: center;
      padding: 12px;
      background: #16213e;
      border-radius: 8px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: background 0.2s, border 0.2s;
      border: 2px solid transparent;
    }
    .modifier-option:hover { background: #1f2b47; }
    .modifier-option.selected {
      border-color: #e94560;
      background: #1f2b47;
    }
    .modifier-option input[type="checkbox"] {
      width: 20px;
      height: 20px;
      margin-right: 12px;
      cursor: pointer;
    }
    .modifier-option .mod-name { flex: 1; }
    .modifier-option .mod-price { color: #e94560; font-weight: bold; }
    .modifier-groups { margin-top: 16px; }
    .modifier-group h4 { color: #ccc; margin-bottom: 8px; font-size: 14px; }
    .modifier-group { margin-bottom: 16px; }
    
    /* Tables */
    .table-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
    }
    .table-card {
      background: #16213e; border-radius: 12px; padding: 16px; text-align: center;
      cursor: pointer;
    }
    .table-card.occupied { border: 2px solid #e94560; }
    .table-card .number { font-size: 24px; font-weight: bold; }
    .table-card .status { font-size: 12px; color: #888; }
    
    /* Orders */
    .order-list { display: flex; flex-direction: column; gap: 12px; }
    .order-card {
      background: #16213e; border-radius: 12px; padding: 12px;
    }
    .order-card .header { border: none; margin: 0; padding: 0; }
    .order-card .items { font-size: 13px; color: #aaa; }
    .order-card .total { color: #e94560; font-weight: bold; }
    .order-card .status {
      display: inline-block; padding: 4px 12px; border-radius: 12px;
      font-size: 11px; background: #333;
    }
    .order-card .status.open { background: #3e8cc7; }
    .order-card .status.preparing { background: #c7a33e; }
    .order-card .status.ready { background: #3ec76b; }
    .order-card .status.paid { background: #333; }
    
    /* Bottom Nav */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #16213e; display: flex;
      border-top: 1px solid #333;
    }
    .nav-item {
      flex: 1; padding: 12px; text-align: center;
      font-size: 11px; cursor: pointer;
    }
    .nav-item.active { color: #e94560; }
    .nav-icon { font-size: 20px; display: block; margin-bottom: 2px; }
    
    /* Utils */
    .hidden { display: none !important; }
    .loading { text-align: center; padding: 40px; color: #888; }
    .empty { text-align: center; padding: 40px; color: #666; }
    
    /* Responsive - Tablets (iPad) */
    @media (min-width: 768px) {
      .menu-grid { grid-template-columns: repeat(4, 1fr); gap: 16px; }
      .table-grid { grid-template-columns: repeat(5, 1fr); gap: 16px; }
      button.pin-key { display:flex;align-items:center;justify-content:center;text-decoration:none;color:inherit; border:0; } .pin-key { width: 90px; height: 90px; font-size: 28px; }
      .pin-keypad { gap: 16px; max-width: 340px; }
      .screen { padding: 24px; }
    }
    
    /* Responsive - Desktop */
    @media (min-width: 1024px) {
      .menu-grid { grid-template-columns: repeat(5, 1fr); gap: 20px; }
      .table-grid { grid-template-columns: repeat(6, 1fr); gap: 20px; }
      button.pin-key { display:flex;align-items:center;justify-content:center;text-decoration:none;color:inherit; border:0; } .pin-key { width: 100px; height: 100px; font-size: 32px; }
      .pin-keypad { gap: 20px; max-width: 380px; }
    }
  </style>
</head>
<body>

<!-- Login Screen -->
<div id="login" class="screen login-screen active">
  <div class="logo">🍜 Apex POS</div>
  <div id="loginError" class="error" style="display:none;margin-bottom:10px;color:#e94560;background:#2a1a1a;padding:10px;border-radius:4px;"></div>
  <select id="staffSelect" style="width:200px;padding:12px;margin-bottom:20px;background:#16213e;color:#fff;border:1px solid #333;border-radius:8px;font-size:16px;">
    <option value="">Select Staff</option>
    <option value="1">Owner</option>
    <option value="2">Manager</option>
    <option value="3">Server</option>
  </select>
  <div class="pin-display">
    <div class="pin-dot" id="dot0"></div>
    <div class="pin-dot" id="dot1"></div>
    <div class="pin-dot" id="dot2"></div>
    <div class="pin-dot" id="dot3"></div>
  </div>
  <div class="pin-keypad">
    <button type="button" class="pin-key" data-num="1" onclick="handlePin(1)">1</button>
    <button type="button" class="pin-key" data-num="2" onclick="handlePin(2)">2</button>
    <button type="button" class="pin-key" data-num="3" onclick="handlePin(3)">3</button>
    <button type="button" class="pin-key" data-num="4" onclick="handlePin(4)">4</button>
    <button type="button" class="pin-key" data-num="5" onclick="handlePin(5)">5</button>
    <button type="button" class="pin-key" data-num="6" onclick="handlePin(6)">6</button>
    <button type="button" class="pin-key" data-num="7" onclick="handlePin(7)">7</button>
    <button type="button" class="pin-key" data-num="8" onclick="handlePin(8)">8</button>
    <button type="button" class="pin-key" data-num="9" onclick="handlePin(9)">9</button>
    <button type="button" class="pin-key clear" data-num="C" onclick="handlePin('C')">C</button>
    <button type="button" class="pin-key" data-num="0" onclick="handlePin(0)">0</button>
    <button type="button" class="pin-key enter" data-num="E" onclick="handlePin('E')">↵</button>
  </div>
  <button onclick="testLogin()" style="margin-top:20px;padding:10px 20px;background:#3e8c70;color:#fff;border:none;border-radius:8px;cursor:pointer;">Test Login (1234)</button>
</div>

<!-- Main Screen -->
<div id="main" class="screen">
  <div class="header">
    <h1>Menu</h1>
    <button class="btn small" id="viewCartBtn">Cart <span class="cart-count">0</span></button>
  </div>
  
  <div class="categories" id="categories"></div>
  <div class="menu-grid" id="menuGrid"></div>
  
  <div class="cart-bar" id="cartBar" style="display:none;">
    <div class="total">$<span id="cartTotal">0.00</span></div>
    <button class="btn" id="checkoutBtn">Checkout</button>
  </div>
</div>

<!-- Tables Screen -->
<div id="tables" class="screen">
  <div class="header">
    <h1>Tables</h1>
    <button class="btn small" id="newTableBtn">+ Table</button>
  </div>
  <div class="table-grid" id="tableGrid"></div>
</div>

<!-- Orders Screen -->
<div id="orders" class="screen">
  <div class="header">
    <h1>Orders</h1>
    <button class="btn small" id="newOrderBtn">+ New Order</button>
  </div>
  <div class="order-list" id="orderList"></div>
</div>

<!-- Printer Settings Modal -->
<div class="modal" id="printerModal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>🖨️ Printer Settings</h2>
      <button class="modal-close" id="closePrinterModal">&times;</button>
    </div>
    <div id="printerModalBody" style="padding: 20px;">
      <div style="margin-bottom: 20px;">
        <label style="display:block; margin-bottom:8px; color:#888;">Connection Type</label>
        <select id="printMethod" style="width:100%; padding:12px; background:#16213e; color:#fff; border:1px solid #333; border-radius:8px;">
          <option value="usb">USB Printer</option>
          <option value="network">Network/Ethernet</option>
          <option value="bluetooth">Bluetooth</option>
        </select>
      </div>
      
      <!-- Network Settings -->
      <div id="networkSettings" style="display:none;">
        <div style="margin-bottom:12px;">
          <label style="display:block; margin-bottom:8px; color:#888;">Printer IP Address</label>
          <input type="text" id="printerIp" placeholder="192.168.1.100" style="width:100%; padding:12px; background:#16213e; color:#fff; border:1px solid #333; border-radius:8px;">
        </div>
        <div style="margin-bottom:12px;">
          <label style="display:block; margin-bottom:8px; color:#888;">Port (default 9100)</label>
          <input type="number" id="printerPort" placeholder="9100" value="9100" style="width:100%; padding:12px; background:#16213e; color:#fff; border:1px solid #333; border-radius:8px;">
        </div>
      </div>
      
      <!-- USB Settings -->
      <div id="usbSettings">
        <div style="margin-bottom:12px;">
          <label style="display:block; margin-bottom:8px; color:#888;">USB Device Name</label>
          <input type="text" id="usbDevice" placeholder="default" style="width:100%; padding:12px; background:#16213e; color:#fff; border:1px solid #333; border-radius:8px;">
        </div>
      </div>
      
      <!-- Bluetooth Settings -->
      <div id="bluetoothSettings" style="display:none;">
        <button class="btn" style="width:100%; margin-bottom:12px;" id="scanBluetoothBtn">🔍 Scan for Printers</button>
        <div id="bluetoothDevices" style="max-height:150px; overflow-y:auto;"></div>
        <p style="color:#666; font-size:12px; margin-top:12px;">Note: Bluetooth requires Chrome browser and HTTPS</p>
      </div>
      
      <button class="btn" style="width:100%; margin-top:20px;" id="savePrinterBtn">Save Settings</button>
      <button class="btn secondary" style="width:100%; margin-top:12px;" id="testPrintBtn">🧪 Test Print</button>
    </div>
  </div>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav" id="bottomNav" style="display:none;">
  <div class="nav-item active" data-screen="main">
    <span class="nav-icon">📋</span>Menu
  </div>
  <div class="nav-item" data-screen="tables">
    <span class="nav-icon">🪑</span>Tables
  </div>
  <div class="nav-item" data-screen="orders">
    <span class="nav-icon">📝</span>Orders
  </div>
  <div class="nav-item" data-screen="kitchen">
    <span class="nav-icon">👨‍🍳</span>Kitchen
  </div>
  <div class="nav-item" data-screen="reports">
    <span class="nav-icon">📊</span>Reports
  </div>
  <div class="nav-item" data-screen="settings">
    <span class="nav-icon">⚙️</span>Settings
  </div>
</nav>

<!-- Item Modal -->
<div class="modal" id="itemModal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modalTitle">Item Name</h2>
      <button class="modal-close" id="closeModal">&times;</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<!-- Cart Modal -->
<div class="modal" id="cartModal">
  <div class="modal-content" style="max-width:500px;">
    <div class="modal-header">
      <h2>🛒 Your Order</h2>
      <button class="modal-close" id="closeCartModal">&times;</button>
    </div>
    <div id="cartModalBody" style="padding:0 20px 20px;"></div>
  </div>
</div>



<!-- Checkout Modal -->
<div id="checkoutModal" class="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:2000;overflow-y:auto;">
  <div style="background:#1a1a2e;padding:20px;width:100%;max-width:450px;margin:0 auto;border-radius:12px;">
    <h2 style="margin-bottom:20px;text-align:center;">Checkout</h2>
    <div id="checkoutItems" style="max-height:200px;overflow-y:auto;margin-bottom:16px;"></div>
    <div style="background:#16213e;padding:16px;border-radius:8px;margin-bottom:16px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;"><span>Subtotal:</span><span id="chkSubtotal">$0</span></div>
      <div id="chkDiscount" style="display:none;justify-content:space-between;margin-bottom:8px;color:#ef4444;"></div>
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;"><span>Tax (8.25%):</span><span id="chkTax">$0</span></div>
      <div style="display:flex;justify-content:space-between;font-size:20px;font-weight:bold;border-top:1px solid #333;padding-top:8px;"><span>Total:</span><span id="chkTotal" style="color:#22c55e;">$0</span></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;">
      <button class="btn" onclick="processPayment('cash')">Cash</button>
      <button class="btn" onclick="processPayment('card')">Card</button>
      <button class="btn secondary" onclick="document.getElementById('checkoutModal').style.display='none'">Cancel</button>
    </div>
  </div>
</div>

<!-- Kitchen Screen -->
<div id="kitchen" class="screen" style="display:none;">
  <div class="header"><h1>Kitchen</h1><button class="btn small" onclick="loadKitchenOrders()">Refresh</button></div>
  <div id="kitchenGrid" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;"></div>
</div>

<!-- Reports Screen -->
<div id="reports" class="screen" style="display:none;">
  <div class="header"><h1>Reports</h1></div>
  <div style="display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;">
    <button class="btn small" onclick="showReport('sales')">Sales</button>
    <button class="btn small" onclick="showReport('employees')">Employees</button>
  </div>
  <div id="reportContent"></div>
</div>

<!-- Settings Screen -->
<div id="settings" class="screen" style="display:none;">
  <div class="header"><h1>Settings</h1></div>
  <div id="settingsContent"></div>
</div>
</body>
</html>
